<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375">
    <title>Канбан — Пустая доска</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: #212529; min-height: 100vh; display: flex; flex-direction: column; }

        .header { background: #fff; border-bottom: 1px solid #dee2e6; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .header h1 { font-size: 18px; font-weight: 700; }
        .btn-icon { background: #228be6; color: #fff; border: none; width: 40px; height: 40px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .tabs { display: flex; background: #fff; border-bottom: 1px solid #dee2e6; }
        .tab { flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 500; color: #6c757d; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: #228be6; border-bottom-color: #228be6; }
        .tab-badge { font-size: 11px; font-weight: 600; color: #6c757d; background: #dee2e6; border-radius: 8px; padding: 1px 6px; margin-left: 4px; }

        .column-content { flex: 1; padding: 16px; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #6c757d; font-size: 14px; gap: 8px; padding-top: 80px; }
        .empty-state i { width: 40px; height: 40px; color: #adb5bd; }
    </style>
</head>
<body>
    <header class="header">
        <h1>Канбан-доска</h1>
        <button class="btn-icon">
            <i data-lucide="plus" style="width:20px;height:20px;"></i>
        </button>
    </header>

    <div class="tabs">
        <div class="tab active">К выполнению <span class="tab-badge">0</span></div>
        <div class="tab">В работе <span class="tab-badge">0</span></div>
        <div class="tab">Готово <span class="tab-badge">0</span></div>
    </div>

    <div class="column-content">
        <div class="empty-state">
            <i data-lucide="clipboard-list"></i>
            <span>Задач пока нет</span>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
