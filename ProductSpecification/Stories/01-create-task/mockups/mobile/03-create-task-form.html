<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375">
    <title>Канбан — Создание задачи</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #212529; min-height: 100vh; display: flex; flex-direction: column; }

        .form-header { background: #fff; border-bottom: 1px solid #dee2e6; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .form-header h2 { font-size: 18px; font-weight: 600; }
        .btn-close { background: none; border: none; color: #6c757d; cursor: pointer; padding: 4px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }

        .form-body { flex: 1; padding: 20px 16px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .form-label .required { color: #fa5252; }
        .form-input { width: 100%; height: 44px; border: 1px solid #dee2e6; border-radius: 6px; padding: 0 12px; font-family: 'Inter', sans-serif; font-size: 16px; color: #212529; outline: none; -webkit-appearance: none; }
        .form-input:focus { border-color: #4dabf7; box-shadow: 0 0 0 3px rgba(77,171,247,0.2); }
        .form-textarea { width: 100%; height: 140px; border: 1px solid #dee2e6; border-radius: 6px; padding: 12px; font-family: 'Inter', sans-serif; font-size: 16px; color: #212529; resize: none; outline: none; -webkit-appearance: none; }
        .form-textarea:focus { border-color: #4dabf7; box-shadow: 0 0 0 3px rgba(77,171,247,0.2); }
        .form-hint { font-size: 12px; color: #6c757d; text-align: right; margin-top: 4px; }

        .form-footer { padding: 16px; border-top: 1px solid #dee2e6; display: flex; gap: 8px; }
        .btn-secondary { flex: 1; background: transparent; color: #6c757d; border: 1px solid #dee2e6; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; height: 44px; border-radius: 6px; cursor: pointer; }
        .btn-primary { flex: 1; background: #228be6; color: #fff; border: none; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; height: 44px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <header class="form-header">
        <button class="btn-close"><i data-lucide="arrow-left" style="width:20px;height:20px;"></i></button>
        <h2>Новая задача</h2>
        <div style="width:44px;"></div>
    </header>

    <div class="form-body">
        <div class="form-group">
            <label class="form-label">Название <span class="required">*</span></label>
            <input type="text" class="form-input" placeholder="Введите название задачи">
            <div class="form-hint">0 / 100</div>
        </div>
        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea class="form-textarea" placeholder="Добавьте описание (необязательно)"></textarea>
            <div class="form-hint">0 / 5000</div>
        </div>
    </div>

    <div class="form-footer">
        <button class="btn-secondary">Отмена</button>
        <button class="btn-primary">Создать</button>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
